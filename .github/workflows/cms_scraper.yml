name: CMS Login Test and Scraper

on:
  workflow_dispatch:

jobs:
  test-cms-login:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google Chrome browser
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium pytz

      - name: Install Chinese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Test connection with curl
        run: |
          curl -I https://cms.bastillepost.com/account/login.php || exit 1

      - name: Run CMS scraper
        env:
          CMS_LOGIN_URL: ${{ secrets.CMS_LOGIN_URL }}
          CMS_ADMIN_URL: ${{ secrets.CMS_ADMIN_URL }}
          CMS_USERNAME: ${{ secrets.CMS_USERNAME }}
          CMS_PASSWORD: ${{ secrets.CMS_PASSWORD }}
        run: python cms_scraper.py

      - name: Upload scraped posts as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fb-scraped-posts
          path: fb_posts_last48h.json
